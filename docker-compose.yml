# =========================================================
# ZimFire Monitor — Portainer stack
#
# No env_file: variables are interpolated below.
#   * Portainer: fill them in the stack's "Environment variables" panel.
#   * CLI:       docker compose auto-loads a local .env for interpolation.
#
# Deploy (CLI):       docker compose up -d --build
# Deploy (Portainer): Stacks -> Add stack -> Repository/Upload,
#                     then add the variables below before deploying.
# =========================================================
services:
  fire-monitor:
    build: .
    image: zimfire-monitor:latest
    container_name: zimfire-monitor
    restart: unless-stopped
    init: true

    environment:
      # ---- required ----
      EUMETSAT_CONSUMER_KEY: ${EUMETSAT_CONSUMER_KEY}
      EUMETSAT_CONSUMER_SECRET: ${EUMETSAT_CONSUMER_SECRET}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY}
      # ---- optional / tunable (defaults applied if unset) ----
      EUM_COLLECTION: ${EUM_COLLECTION:-EO:EUM:DAT:0682}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.5}
      LOOKBACK_HOURS: ${LOOKBACK_HOURS:-2}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-900}
      RUN_ONCE: ${RUN_ONCE:-false}
      # ---- Telerivet (unused by this build; safe to leave blank) ----
      TELERIVET_API_KEY: ${TELERIVET_API_KEY:-}
      TELERIVET_PROJECT_ID: ${TELERIVET_PROJECT_ID:-}
      TELERIVET_GROUP_ID: ${TELERIVET_GROUP_ID:-}
      ALERT_TO: ${ALERT_TO:-}

    volumes:
      - fire_output:/app/output
      - fire_db:/app/src/db

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  fire_output:
  fire_db:
