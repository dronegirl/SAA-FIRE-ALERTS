# =========================================================
# ZimFire Monitor — Portainer stack (no build step)
#
# This stack references a PREBUILT image. Build it once on the
# Docker host so Portainer never needs a build context:
#
#     cd ZimFire-Deploy
#     docker build -t zimfire-monitor:latest .
#
# Then deploy this stack in Portainer (Web editor is fine now —
# there are no files to ship, just this compose). Set the env
# vars in the stack's "Environment variables" panel.
#
# Host CLI alternative (build + run in one go):
#     docker compose -f docker-compose.build.yml up -d --build
# =========================================================
services:
  fire-monitor:
    image: zimfire-monitor:latest
    container_name: zimfire-monitor
    restart: unless-stopped
    init: true

    environment:
      # ---- required ----
      EUMETSAT_CONSUMER_KEY: ${EUMETSAT_CONSUMER_KEY}
      EUMETSAT_CONSUMER_SECRET: ${EUMETSAT_CONSUMER_SECRET}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY}
      # ---- optional / tunable (defaults applied if unset) ----
      EUM_COLLECTION: ${EUM_COLLECTION:-EO:EUM:DAT:0682}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.5}
      LOOKBACK_HOURS: ${LOOKBACK_HOURS:-2}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-900}
      RUN_ONCE: ${RUN_ONCE:-false}
      # ---- Telerivet (unused by this build; safe to leave blank) ----
      TELERIVET_API_KEY: ${TELERIVET_API_KEY:-}
      TELERIVET_PROJECT_ID: ${TELERIVET_PROJECT_ID:-}
      TELERIVET_GROUP_ID: ${TELERIVET_GROUP_ID:-}
      ALERT_TO: ${ALERT_TO:-}

    volumes:
      - fire_output:/app/output
      - fire_db:/app/src/db

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  fire_output:
  fire_db:
